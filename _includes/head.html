<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo title=false %}
  <title>
  {%- if page.title -%}
    {{ page.title }} | {{ site.title }}
  {%- else -%}
    {{ site.title }} | {{ site.short_description }}
  {%- endif -%}
  </title>
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}

  {%if site.keywords %}
    <meta name="keywords" content="{{ site.keywords | join: ', ' | escape }}" />
  {%endif %}

	<link rel="apple-touch-icon-precomposed" sizes="152x152" href="{% asset 'apple-touch-icon-152x152-precomposed.png' @path %}">
	<link rel="apple-touch-icon-precomposed" sizes="120x120" href="{% asset 'apple-touch-icon-120x120-precomposed.png' @path %}">
	<link rel="apple-touch-icon-precomposed" sizes="76x76" href="{% asset 'apple-touch-icon-76x76-precomposed.png' @path %}">
	<link rel="apple-touch-icon-precomposed" sizes="60x60" href="{% asset 'apple-touch-icon-60x60-precomposed.png' @path %}">
	<link rel="apple-touch-icon" sizes="144x144" href="{% asset 'apple-touch-icon-144x144.png' @path %}">
	<link rel="apple-touch-icon" sizes="114x114" href="{% asset 'apple-touch-icon-114x114.png' @path %}">
	<link rel="apple-touch-icon" sizes="72x72" href="{% asset 'apple-touch-icon-72x72.png' @path %}">
	<link rel="apple-touch-icon" sizes="57x57" href="{% asset 'apple-touch-icon.png' @path %}">
	<link rel="icon" sizes="228x228" href="{% asset 'coast-icon-228x228.png' @path %}">
	<link rel="shortcut icon" href="{% asset 'favicon.ico' @path %}">
	<link rel="icon" type="image/png" sizes="64x64" href="{% asset 'favicon.png' @path %}">
	{% include analytics.html %}
  {% include mailerlite.html %}

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://rigoblock.com/#organization",
        "name": "RigoBlock",
        "url": "https://rigoblock.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://rigoblock.com/assets/images/logo.png"
        },
        "sameAs": [
          "https://twitter.com/rigoblock",
          "https://github.com/rigoblock",
          "https://linkedin.com/company/rigoblock",
          "https://docs.rigoblock.com"
        ],
        "description": "RigoBlock is secure smart vault infrastructure for DeFi and autonomous agents. Live since 2018 on 7 EVM chains with NAV Shield protection, X402 micropayment API, and Proof-of-Performance incentives."
      },
      {
        "@type": "WebSite",
        "@id": "https://rigoblock.com/#website",
        "url": "https://rigoblock.com",
        "name": "RigoBlock",
        "publisher": { "@id": "https://rigoblock.com/#organization" }
      },
      {
        "@type": "SoftwareApplication",
        "@id": "https://rigoblock.com/#protocol",
        "name": "RigoBlock Protocol",
        "applicationCategory": "FinanceApplication",
        "applicationSubCategory": "DeFi Protocol",
        "operatingSystem": "Ethereum, Arbitrum, Base, Optimism, BSC, Polygon, Unichain",
        "url": "https://rigoblock.com",
        "description": "Secure smart vaults for DeFi and autonomous agents with X402 micropayment API, NAV Shield protection, delegated execution, and Proof-of-Performance incentives. Live since 2018 on 7 EVM chains.",
        "featureList": [
          "X402 Micropayment API for autonomous AI agents",
          "NAV Shield — protocol-enforced circuit breaker",
          "Manual and Delegated execution modes",
          "Cross-chain smart vaults on 7 EVM networks",
          "Onchain oracle with 70K+ price updates via BackGeoOracle",
          "Uniswap V2/V3/V4, 0x, GMX V2, Across integrations",
          "Proof-of-Performance algorithm",
          "GRG governance token"
        ],
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "isAccessibleForFree": true,
        "publisher": { "@id": "https://rigoblock.com/#organization" }
      }
    ]
  }
  </script>

</head>
